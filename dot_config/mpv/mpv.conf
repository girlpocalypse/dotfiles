af=lavfi=[dynaudnorm]
save-position-on-quit=yes

# ============================================================================
#  VIDEO OUTPUT   (renderer runs on the iGPU — that's what drives the panel)
# ============================================================================
vo=gpu-next                 # libplacebo renderer: best tone-mapping & quality
gpu-api=vulkan              # canonical choice for gpu-next on any OS
#gpu-api=d3d11              # << HYBRID-GPU WINDOWS GOTCHA: if Vulkan grabs the
                            #    NVIDIA device or you get a black screen, switch
                            #    to d3d11 — it binds cleanly to the Intel display
                            #    adapter. (Or keep vulkan and force the iGPU with
                            #     vulkan-device="<name from --vulkan-device=help>")
 
dither-depth=auto           # 10-bit output: match the panel's bit depth

# ============================================================================
#  HARDWARE DECODING   —   NVDEC on the 2080 Ti, copied back to system RAM
# ============================================================================
hwdec=nvdec            # decode on dGPU, copy frames to RAM so the iGPU shows them
 
# Whitelist ONLY the codecs Turing's NVDEC actually supports. Note the absence
# of av1: the 2080 Ti has no AV1 hardware decoder, so AV1 falls through to
# software (dav1d, which is fast). Listing only supported codecs also avoids
# NVIDIA's "probe every codec" startup slowdown.
hwdec-codecs=h264,hevc,vp9,vp8,vc1,mpeg1video,mpeg2video,mpeg4

# ============================================================================
#  SCALING / RESAMPLING   (sharp, well-proven)
# ============================================================================
scale=ewa_lanczossharp      # luma upscale (sub-4K -> 4K)
cscale=ewa_lanczossharp     # chroma upscale (matters for ALL 4:2:0 video)
dscale=mitchell             # luma downscale (only used for >4K sources)
 
scale-antiring=0.6          # tame ringing/halos from the sharp filters
cscale-antiring=0.6
dscale-antiring=0.6
 
correct-downscaling=yes     # proper low-pass when shrinking
linear-downscaling=yes      # downscale in linear light
sigmoid-upscaling=yes       # upscale through a sigmoid curve -> less ringing
 
# If the iGPU can't keep up at 4K (watch the stats overlay, key "i", for dropped
# frames) step down to the much lighter separable filter:
#   scale=spline36
#   cscale=spline36

# ============================================================================
#  DITHERING   (8-bit + FRC panel — its "10-bit" is temporal dithering, not native)
# ============================================================================
# The panel is physically ~8-bit and fakes 10-bit with FRC, so for mpv's own
# dithering treat it as 8-bit: "fruit" (blue-noise) is the right pick — cleaner
# than "ordered", which can show a faint cross-hatch at 8-bit — and still cheap
# on the iGPU. (dither-depth=auto, set above, still outputs 10-bit when your
# GPU/OS is in 10 bpc mode so the panel's FRC can finish the job; otherwise mpv
# dithers to 8-bit right here, which is exactly the case "fruit" is best at.)
#   dither=fruit
# If the iGPU has headroom, this is the quality ceiling at 8-bit output:
dither=error-diffusion
error-diffusion=sierra-lite   # or: burkes

# ============================================================================
#  DEBANDING   (master switch; per-source tuning is in the profiles at the end)
# ============================================================================
# deband=yes

# ============================================================================
#  COLOR TARGET   (SDR panel)
# ============================================================================
icc-profile=/var/home/user/Documents/XG2700-4K.icc

# ============================================================================
#  MOTION   (smoother A/V timing; interpolation OFF — too heavy for an iGPU)
# ============================================================================
video-sync=display-resample # align to the refresh clock -> less judder/drift
#video-sync=audio           # <- safe fallback if display-resample misbehaves
 
# Optional motion interpolation (smooths 24p on 60Hz, but blurs & is iGPU-heavy):
#interpolation=yes
#tscale=oversample

# ============================================================================
#  MOTION   (smoother A/V timing; interpolation OFF — too heavy for an iGPU)
# ============================================================================
video-sync=display-resample # align to the refresh clock -> less judder/drift
#video-sync=audio           # <- safe fallback if display-resample misbehaves
 
# Optional motion interpolation (smooths 24p on 60Hz, but blurs & is iGPU-heavy):
# SOAP OPERA LOOK
#interpolation=yes
#tscale=oversample

# ============================================================================
#  CACHE   (helps high-bitrate 4K remuxes and network streams)
# ============================================================================
cache=yes
demuxer-max-bytes=1GiB
demuxer-max-back-bytes=256MiB
demuxer-readahead-secs=20

# ============================================================================
#  AUDIO
# ============================================================================
volume=100
volume-max=130
audio-file-auto=fuzzy       # auto-load matching external audio
audio-pitch-correction=yes

# ============================================================================
#  SUBTITLES
# ============================================================================
sub-auto=fuzzy              # auto-load loosely-matching external subs
sub-font-size=42            # taste
sub-border-size=2.5         # taste
slang=en,eng
alang=en,eng                # change to your preference

# ============================================================================
#  yt-dlp   (avoid AV1 so your hardware decoder is actually used)
# ============================================================================
# YouTube serves a lot of AV1, which your 2080 Ti can't HW-decode. Prefer VP9 /
# H.264 (VP9 4K *is* NVDEC-accelerated on Turing) and cap at 4K.
ytdl-format=bestvideo[vcodec!*=av01][height<=?2160]+bestaudio/best

################################################################################
#  CONDITIONAL PROFILES — auto-applied per source, restored when not matching  #
#                                                                              #
#  Detection is by transfer function: gamma == pq or hlg  =>  HDR              #
#                                       anything else      =>  SDR             #
#                                                                              #
#  profile-restore=copy-equal makes each profile's options REVERT once its     #
#  condition stops matching, so HDR settings never "stick" onto the next SDR   #
#  file (and vice-versa).                                                      #
################################################################################


[hdr]
profile-desc=HDR source -> SDR display (tone mapping)
profile-cond=p["video-params/gamma"] == "pq" or p["video-params/gamma"] == "hlg"

profile-restore=copy-equal
 
tone-mapping=spline         # libplacebo's adaptive default: its pivot/knee point is
                            #  tuned per-scene from the measured scene brightness — which
                            #  is exactly what hdr-compute-peak (below) feeds it — and it

                            #  also honors HDR10+ metadata when a file carries it. That
                            #  scene-adaptiveness is the "dynamic" part; it gives more punch
                            #  and better-preserved detail than bt.2390 under the heavy
                            #  HDR->SDR compression your SDR panel needs.
                            #   tone-mapping=auto    -> heuristic; also picks st2094-40 for HDR10+
                            #   tone-mapping=bt.2390 -> fixed ITU spec roll-off: neutral &
                            #                           broadcast-reference, but NOT scene-adaptive
                            #   tone-mapping-param=0.30 -> spline pivot (PQ space), if you tune
hdr-compute-peak=yes        # measures each scene's peak/average in real time. NOTE: this is
                            #  what makes spline adaptive on plain HDR10 (no dynamic metadata) —
                            #  without it, spline falls back to a fixed knee and loses the
                            #  per-scene behavior you're after.
hdr-peak-percentile=99.995  # ignore tiny specular outliers when measuring peak
hdr-contrast-recovery=0.30  # claw back local contrast lost in tone mapping
gamut-mapping-mode=perceptual   # fit the BT.2020 gamut into the display gamut
 
# 10-bit HDR barely bands — keep debanding light so you don't scrub detail:
deband-iterations=1
deband-threshold=32
deband-range=16
deband-grain=8

deband=no

[sdr]
profile-desc=SDR source -> SDR display (direct)
profile-cond=not (p("video-params/gamma","")=="pq" or p("video-params/gamma","")=="hlg")
profile-restore=copy-equal
 
# Most SDR content is 8-bit and bands more in gradients/skies, so deband a bit
# harder with a little grain to dither it away:
deband-iterations=2
deband-threshold=48
deband-range=16
deband-grain=32
deband=yes